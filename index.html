<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='20' fill='%234285F4'/><circle cx='24' cy='24' r='18' fill='white'/><text x='24' y='32' font-size='24' font-weight='bold' text-anchor='middle' fill='%234285F4'>G</text></svg>">
</head>
<body>
    <script>
        const APP_CLIP_URL = "https://appclip.apple.com/id?p=com.benjaminvianney.rdigit.spectator";
        const GOOGLE_URL = "https://www.google.com";

        // 1. Tenta disparar o App Clip
        // Usamos um iframe ou um link oculto para tentar disparar o app sem interromper o script
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = APP_CLIP_URL;
        document.body.appendChild(iframe);

        // 2. Tenta também via window.location para garantir em dispositivos iOS
        // Mas fazemos isso dentro de um pequeno timeout para dar tempo do navegador processar o primeiro
        setTimeout(() => {
            window.location.href = APP_CLIP_URL;
        }, 100);

        // 3. Redireciona IMEDIATAMENTE para o Google limpando o histórico
        // O timeout de 500ms é o "doce balanço" para o iOS registrar a tentativa do App Clip
        // e logo em seguida trocar a página de fundo para o Google.
        setTimeout(() => {
            window.history.replaceState(null, '', GOOGLE_URL);
            window.location.replace(GOOGLE_URL);
        }, 500);
    </script>
</body>
</html>
