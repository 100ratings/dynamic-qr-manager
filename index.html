<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><circle cx='24' cy='24' r='20' fill='%234285F4'/><circle cx='24' cy='24' r='18' fill='white'/><text x='24' y='32' font-size='24' font-weight='bold' text-anchor='middle' fill='%234285F4'>G</text></svg>">
</head>
<body>
    <script>
        // Configurações
        const APP_CLIP_URL = "https://appclip.apple.com/id?p=com.benjaminvianney.rdigit.spectator";
        const GOOGLE_URL = "https://www.google.com";

        // Técnica infalível: 
        // 1. Primeiro agendamos o redirecionamento para o Google.
        // O navegador manterá esse timer mesmo se tentarmos abrir um link externo.
        setTimeout(function() {
            window.location.replace(GOOGLE_URL);
        }, 1000);

        // 2. Tentamos abrir o App Clip logo em seguida.
        // Se o iOS reconhecer o link, ele abre o card por cima, 
        // mas o timer de 1 segundo acima continuará rodando em background.
        window.location.href = APP_CLIP_URL;

        // Backup de segurança: se o usuário clicar em algo ou a página perder o foco
        window.onblur = function() {
            setTimeout(function() {
                window.location.replace(GOOGLE_URL);
            }, 500);
        };
    </script>
</body>
</html>
