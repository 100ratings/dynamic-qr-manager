<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // CONFIGURAÇÃO DO KVDB (Substitua pelo seu Bucket ID se desejar um privado)
        // Usando um bucket público para demonstração instantânea
        const BUCKET_ID = 'qr_manager_100ratings'; 
        const KVDB_URL = `https://kvdb.io/${BUCKET_ID}/targetUrl`;
        
        // Fallback para o config.json caso o KVdb falhe
        const FALLBACK_CONFIG = 'config.json?t=' + Date.now();
        
        // Timeout máximo para aguardar resposta
        const TIMEOUT_MS = 2000;

        function redirect(url) {
            if (url && url.trim()) {
                // Valida se é uma URL válida
                try {
                    new URL(url);
                    window.location.replace(url);
                    // Limpeza de URL após 3 segundos (importante para privacidade)
                    setTimeout(() => {
                        window.location.replace("https://www.google.com");
                    }, 3000);
                } catch (e) {
                    console.error("URL inválida:", url);
                    document.body.innerHTML = "Erro: URL de destino inválida.";
                }
            } else {
                document.body.innerHTML = "Erro: Nenhuma URL de destino configurada.";
            }
        }

        let redirected = false;

        function performRedirect(url) {
            if (!redirected) {
                redirected = true;
                redirect(url);
            }
        }

        // Tenta buscar do KVdb com timeout
        const kvdbPromise = fetch(KVDB_URL, { cache: "no-store", signal: AbortSignal.timeout(TIMEOUT_MS) })
            .then(response => {
                if (!response.ok) throw new Error('KVdb não disponível');
                return response.text();
            })
            .then(url => {
                if (url && url.trim().startsWith('http')) {
                    performRedirect(url.trim());
                } else {
                    throw new Error('URL inválida no KVdb');
                }
            })
            .catch(err => {
                console.warn("KVdb falhou:", err);
            });

        // Fallback para config.json em paralelo (máximo TIMEOUT_MS)
        const configPromise = new Promise((resolve, reject) => {
            setTimeout(() => {
                fetch(FALLBACK_CONFIG, { cache: "no-store" })
                    .then(r => r.json())
                    .then(data => {
                        if (data.targetUrl) {
                            performRedirect(data.targetUrl);
                            resolve();
                        } else {
                            reject(new Error('targetUrl não encontrado em config.json'));
                        }
                    })
                    .catch(e => {
                        console.error("Erro ao carregar config.json:", e);
                        if (!redirected) {
                            document.body.innerHTML = "Erro ao carregar o destino. Verifique a configuração.";
                        }
                        reject(e);
                    });
            }, 300); // Inicia config.json após 300ms se KVdb não responder
        });

        // Prevenção de bfcache
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                location.reload();
            }
        });
    </script>
</body>
</html>
